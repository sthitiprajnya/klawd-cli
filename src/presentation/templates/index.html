<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniAgent Enterprise Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OmniAgent Enterprise 🧠</h1>
            <span class="badge" id="status-badge">Daemon Online</span>
        </div>

        <div class="card">
            <h2>Active Job Queue</h2>
            <div class="job-list" id="jobs-container">

            </div>
        </div>

        <div class="card">
            <h2>System Intelligence</h2>
            <h3>Absorbed Skills Context (Majin Buu)</h3>
            <pre id="skills-container">Loading skills...</pre>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
