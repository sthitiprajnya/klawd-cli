apiVersion: openShell/v1
kind: Policy
agents:
  - selector: template=arap-intake
    filesystem:
      allow: [/workspace/absorbed/**, /var/lib/daemon/skills/**, /tmp/arap-sandbox/**]
      deny: [/etc/**, /var/lib/daemon/mempalace/wings/orchestrator-diary/**]
    network:
      egress_allowlist: [github.com, api.github.com, registry.npmjs.org, pypi.org, api.osv.dev]
      egress_denylist: ["0.0.0.0/0"]
    intent:
      require_approval: [write_production_database, spawn_agent, modify_policy]
      auto_approve:
        - action: clone_repository
          condition: "url matches github.com/*"

  - selector: template=opencode-build
    filesystem:
      allow: [/workspace/src/**, /workspace/tests/**, /tmp/**]
      deny: [/var/lib/daemon/**, /etc/**]
    network:
      egress_allowlist: [hexstrike-server, cyberstrike-bolt]
      egress_denylist: ["0.0.0.0/0"] # default-deny all other egress

  - selector: template=auditor-agent
    filesystem:
      allow: [/workspace/**]
      deny: [/workspace/**/.*, /etc/**, /var/**, /root/**, /home/**, /opt/**]
      read_only: true
    network:
      egress_allowlist: [hexstrike-server, cyberstrike-bolt]
      egress_denylist: ["0.0.0.0/0"] # default-deny all other egress
    intent:
      require_approval: [write_production_database, spawn_agent, modify_policy]
